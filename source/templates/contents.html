<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Poets Codex — Contents</title>

<style>
/* --- Wooden desk background (same as cover) --- */
body {
  margin: 0;
  padding: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: #d5b485;
  background-image:
    radial-gradient(circle at 20% 40%, rgba(0,0,0,0.07), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 70%),
    radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.40) 100%);
  background-blend-mode: multiply, overlay, overlay, normal;

  font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
  color: #3b2a22;
}

/* --- Interior frame (same dimensions as cover) --- */
.codex-frame {
  width: min(420px, 90vw);
  height: 85vh;
  padding: 2rem;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;

  background: #ddc8a9;
  background-image:
    linear-gradient(
      to bottom,
      rgba(255,255,255,0.45),
      rgba(255,255,255,0.10)
    );

  border-radius: 12px;

  box-shadow:
    inset 0 0 32px rgba(0,0,0,0.30),
    inset 0 0 14px rgba(0,0,0,0.12),
    0 0 24px rgba(0,0,0,0.30),
    0 0 0 2px rgba(0,0,0,0.18);
}

/* --- Contents title --- */
.codex-frame h2 {
  margin: 0;
  font-size: 1.6rem;
  font-weight: 600;
}

/* --- Contents list --- */
.contents-section {
  width: 100%;
  flex: 1;
  overflow-y: auto;
  margin-top: 1rem;
}

.contents-section h3 {
  margin-top: 1.2rem;
  margin-bottom: 0.6rem;
  font-size: 1.1rem;
  font-weight: 600;
}

/* Preface link inside h3 */
.preface-link {
  text-decoration: none;
  color: #3b2a22;
  font-weight: 600;
  transition: color 0.2s ease, text-decoration 0.2s ease, transform 0.1s;
}

.preface-link:hover {
  text-decoration: underline;
  color: #5a4636;
}

.preface-link:active {
  text-decoration: underline;
  color: #5a4636;
  transform: translateY(1px);
}

.contents-section ul {
  list-style: none;
  padding: 0;
  margin: 0.5rem 0 1rem 0;
}

.contents-section li {
  margin-bottom: 0.6rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid #b8a78f;
}

/* --- Link interactions (desktop + mobile) --- */
.contents-section a {
  text-decoration: none;
  color: #3b2a22;
  font-weight: 500;
  transition: color 0.2s ease, text-decoration 0.2s ease, transform 0.1s;
}

/* Desktop hover */
.contents-section a:hover {
  text-decoration: underline;
  color: #5a4636;
}

/* Mobile + desktop active */
.contents-section a:active {
  text-decoration: underline;
  color: #5a4636;
  transform: translateY(1px);
}

/* --- Close button (same size as Open button on cover) --- */
.close-button {
  padding: clamp(0.55rem, 2vw, 0.9rem) clamp(1.2rem, 4vw, 1.8rem);
  font-size: clamp(1rem, 4vw, 1.3rem);

  background: #6a4a2c;
  background-image:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 2px,
      rgba(0,0,0,0.10) 3px,
      rgba(0,0,0,0.10) 5px
    ),
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.10), transparent 60%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.08), transparent 70%),
    linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));

  border: 1px solid #f5d99c;
  color: #f5d99c;

  border-radius: 4px;
  text-decoration: none;
  cursor: pointer;

  box-shadow:
    inset 0 0 6px rgba(255,255,255,0.2),
    0 0 8px rgba(0,0,0,0.45);

  transition: background 0.25s, color 0.25s, box-shadow 0.25s, transform 0.1s;
}

/* Desktop hover */
.close-button:hover {
  background: #f5d99c;
  color: #6a4a2c;
  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.35),
    0 0 14px rgba(255,220,150,0.6);
}

/* Mobile + desktop active */
.close-button:active {
  background: #f5d99c;
  color: #6a4a2c;
  box-shadow:
    inset 0 0 12px rgba(0,0,0,0.45),
    0 0 10px rgba(255,220,150,0.5);
  transform: translateY(1px);
}
</style>

<script>
function closeCodex() {
  window.location.href = "index.html";
}
</script>

</head>
<body>

<div class="codex-frame">

  <h2>Contents</h2>

  <div class="contents-section">

    <!-- Preface as an h3 link -->
    <h3><a href="preface.html" class="preface-link">Preface</a></h3>

    <h3>Poets</h3>
    <ul>
      <li><a href="poets/rumi.html">Jalal al‑Din Rumi (1207–1273)</a></li>
      <li><a href="poets/shakespeare.html">William Shakespeare (1564–1616)</a></li>
      <li><a href="poets/iqbal.html">Muhammad Iqbal (1877–1938)</a></li>
    </ul>
  </div>

  <a onclick="closeCodex()" class="close-button">Close</a>

</div>

</body>
</html>
