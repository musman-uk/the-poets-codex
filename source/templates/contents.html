<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="https://musman-uk.github.io/the-poets-codex/assets/images/favicon.png">

  <title>Contents</title>

  <style>
    /* Prevent page-level scrolling; the codex is intended to remain visually fixed */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* Background maintains the physical-desk metaphor established on the cover */
    body {
      display: flex;
      justify-content: center;
      align-items: center;

      background: #d5b485;
      background-image:
        radial-gradient(circle at 20% 40%, rgba(0,0,0,0.07), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 70%),
        radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.40) 100%);
      background-blend-mode: multiply, overlay, overlay, normal;

      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      color: #3b2a22;
    }

    /* Frame dimensions preserve a book-like proportion across devices */
    .codex-frame {
      width: min(420px, 100vw);
      height: min(700px, 100vh);

      max-width: 420px;
      max-height: 700px;

      padding: 2rem;

      display: flex;
      flex-direction: column;
      justify-content: space-evenly;

      /* Light vertical sheen to evoke aged paper rather than a flat panel */
      background: #ddc8a9;
      background-image:
        linear-gradient(
          to bottom,
          rgba(255,255,255,0.45),
          rgba(255,255,255,0.10)
        );

      border-radius: 12px;

      /* Inner shadows reinforce depth and the physical codex metaphor */
      box-shadow:
        inset 0 0 32px rgba(0,0,0,0.30),
        inset 0 0 14px rgba(0,0,0,0.12),
        0 0 24px rgba(0,0,0,0.30),
        0 0 0 2px rgba(0,0,0,0.18);
    }

    .codex-frame h2 {
      margin: 0;
      margin-top: 1.2rem;
      font-size: 1.6rem;
      font-weight: 600;
      text-align: center;
    }

    /* Masked scroll region avoids visible scrollbars while still allowing overflow */
    .contents-section {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      margin-top: 0.5rem;

      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;

      scrollbar-width: none;
    }

    .contents-section::-webkit-scrollbar {
      display: none;
    }

    .contents-section h3 {
      margin-top: 1.6em;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Links styled to match the manuscript aesthetic rather than modern UI chrome */
    .contents-section a,
    .preface-link {
      text-decoration: none;
      color: #3b2a22;
      font-weight: 500;
      transition: color 0.25s ease, letter-spacing 0.25s ease;
    }

    .contents-section a:hover,
    .preface-link:hover {
      color: #7a5a42;
      letter-spacing: 0.4px;
      text-decoration: underline;
    }

    .contents-section a:active,
    .preface-link:active {
      color: #7a5a42;
      transform: translateY(1px);
    }

    /* Minimal list styling to keep the hierarchy clean and unobtrusive */
    .contents-section ul {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 1rem 0;
    }

    .contents-section li {
      margin-bottom: 0.6rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid #b8a78f;
    }

    /* Button styling mirrors the metal-plate aesthetic used on the cover */
    .close-button {
      width: auto;
      align-self: center;
      display: inline-block;

      margin-bottom: 0.7rem;

      padding: clamp(0.55rem, 2vw, 0.9rem) clamp(1.2rem, 4vw, 1.8rem);
      font-size: clamp(1rem, 4vw, 1.3rem);

      background: #6a4a2c;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 2px,
          rgba(0,0,0,0.10) 3px,
          rgba(0,0,0,0.10) 5px
        ),
        radial-gradient(circle at 25% 30%, rgba(255,255,255,0.10), transparent 60%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.08), transparent 70%),
        linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));

      border: 1px solid #f5d99c;
      color: #f5d99c;

      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;

      box-shadow:
        inset 0 0 6px rgba(255,255,255,0.2),
        0 0 8px rgba(0,0,0,0.45);

      transition: background 0.25s, color 0.25s, box-shadow 0.25s, transform 0.1s;
    }

    .close-button:hover {
      background: #f5d99c;
      color: #6a4a2c;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.35),
        0 0 14px rgba(255,220,150,0.6);
    }

    .close-button:active {
      background: #f5d99c;
      color: #6a4a2c;
      transform: translateY(1px);
    }

    /* Dark mode maintains the material metaphor while adjusting luminance */
    @media (prefers-color-scheme: dark) {
      body {
        background: #62482a;
        background-image:
          radial-gradient(circle at 20% 40%, rgba(0,0,0,0.25), transparent 60%),
          radial-gradient(circle at 80% 70%, rgba(0,0,0,0.20), transparent 70%),
          radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.70) 100%);
        color: #f5e7cf;
      }

      .codex-frame {
        background: #2a1f12;
        background-image:
          linear-gradient(
            to bottom,
            rgba(255,255,255,0.10),
            rgba(255,255,255,0.03)
          );

        box-shadow:
          inset 0 0 32px rgba(0,0,0,0.55),
          inset 0 0 14px rgba(0,0,0,0.30),
          0 0 24px rgba(0,0,0,0.55),
          0 0 0 2px rgba(0,0,0,0.40);
      }

      .codex-frame,
      .codex-frame p,
      .codex-frame a,
      .contents-section a,
      .preface-link {
        color: #f5e7cf;
      }

      .contents-section a:hover,
      .preface-link:hover {
        color: #f0d7b0;
      }

      .close-button {
        background: #3a2a18;
        border-color: #e8c98a;
        color: #e8c98a;

        background-image:
          repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.02) 0px,
            rgba(255,255,255,0.02) 2px,
            rgba(0,0,0,0.18) 3px,
            rgba(0,0,0,0.18) 5px
          ),
          radial-gradient(circle at 25% 30%, rgba(255,255,255,0.06), transparent 60%),
          radial-gradient(circle at 75% 70%, rgba(255,255,255,0.04), transparent 70%),
          linear-gradient(135deg, rgba(0,0,0,0.65), rgba(0,0,0,0.85));
      }

      .close-button:hover {
        background: #e8c98a;
        color: #3a2a18;
      }
    }
  </style>

  <script>
    /*
      The contents list may exceed the fixed codex frame, so the inner section
      scrolls while the outer layout remains static. Scrollbars are hidden to
      preserve the manuscript aesthetic, so a mask fade is used as the overflow
      indicator. The fade is removed at the bottom to avoid implying additional
      content. Direct navigation avoids history‑dependent behaviour.
    */

    function closeCodex() {
      window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const section = document.querySelector(".contents-section");

      function updateFade() {
        const atBottom =
          section.scrollTop + section.clientHeight >= section.scrollHeight - 1;

        if (atBottom) {
          section.style.webkitMaskImage = "none";
          section.style.maskImage = "none";
        } else {
          section.style.webkitMaskImage =
            "linear-gradient(to bottom, black 60%, transparent 100%)";
          section.style.maskImage =
            "linear-gradient(to bottom, black 60%, transparent 100%)";
        }
      }

      section.addEventListener("scroll", updateFade);
      updateFade();
    });
  </script>

</head>
<body>

  <div class="codex-frame">

    <h2>Contents</h2>

    <div class="contents-section">

      <h3><a href="preface.html" class="preface-link">Preface</a></h3>

      <h3>Poets</h3>
      
      <!-- poets_list -->

    </div>

    <a onclick="closeCodex()" class="close-button">Close</a>

  </div>

</body>
</html>
