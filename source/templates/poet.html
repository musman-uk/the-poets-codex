{% extends "base.html" %}

{% block extra_head %}
<style>
    :root {
        --color-1: {{ palette[0] }};
        --color-2: {{ palette[1] }};
        --color-3: {{ palette[2] }};
        --color-4: {{ palette[3] }};
        --color-5: {{ palette[4] }};
    }

    body.poet-theme {
        background-color: var(--color-1);
        color: var(--color-5);
    }

    .back-link a {
        color: var(--color-3);
        text-decoration: none;
    }

    .back-link a:hover {
        color: var(--color-4);
        text-decoration: underline;
    }

    .poet-image img {
        max-width: 100%;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block body_class %}poet-theme{% endblock %}

{% block content %}
<div class="back-link">
    <a href="/poets/">← Back to Poets</a>
</div>

<article class="poet-page">
    {% if image %}
    <div class="poet-image">
        <img src="/assets/images/{{ image }}" alt="{{ title }}">
    </div>
    {% endif %}

    <h1>{{ title }}</h1>

    <div class="poet-bio">
        {{ content }}
    </div>
</article>
{% endblock %}
