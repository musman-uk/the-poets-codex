<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="icon" type="image/png" href="https://musman-uk.github.io/the-poets-codex/assets/images/favicon.png">
  
  <title>The Poets Codex</title>
  <style>
    /* Lock the viewport so the cover behaves like a fixed artefact, not a scrollable page */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;           /* Avoid scrollbars on small devices */
      overscroll-behavior: none;  /* Avoid bounce/elastic scroll on touch devices */
    }

    /* Desk-like surround to frame the codex as a physical object rather than a flat page */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #d5b485;
      background-image:
        radial-gradient(circle at 20% 40%, rgba(0,0,0,0.07), transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 70%),
        radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.40) 100%);
      background-blend-mode: multiply, overlay, overlay, normal;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    }

    /* Card behaves like a book cover: capped on desktop, but allowed to fill smaller viewports */
    .cover-frame {
      width: min(420px, 100vw);   /* Prevents the cover from feeling oversized on large screens */
      height: min(700px, 100vh);  /* Keeps full-cover presence on phones without forcing scroll */
      max-width: 420px;
      max-height: 700px;
      padding: 2rem;

      /* Layered gradients to suggest worn leather with subtle directionality and sheen */
      background: #6a4a2c;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 2px,
          rgba(0,0,0,0.10) 3px,
          rgba(0,0,0,0.10) 5px
        ),
        radial-gradient(circle at 25% 30%, rgba(255,255,255,0.10), transparent 60%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,0.08), transparent 70%),
        linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));
      background-blend-mode: overlay, overlay, multiply, normal;

      border: 3px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      box-shadow:
        inset 0 0 20px rgba(0,0,0,0.55),
        inset 0 0 40px rgba(0,0,0,0.35),
        0 0 40px rgba(0,0,0,0.65);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* Gap scales with viewport so the composition stays balanced on both phone and desktop */
      gap: clamp(2.8rem, 8vw, 5rem);
    }

    /* Title uses a metal/foil gradient to read as embossed lettering rather than flat text */
    .gold-title {
      font-size: clamp(2rem, 7vw, 2.6rem);
      letter-spacing: clamp(0.06em, 0.4vw, 0.15em);
      line-height: 1.1;
      text-align: center;
      max-width: 90%;
      margin-top: clamp(-1.4rem, -2.4vw, -2rem);

      background: linear-gradient(
        90deg,
        #fff4d0 0%,
        #d4a84f 20%,
        #f7e7b5 50%,
        #d4a84f 80%,
        #fff4d0 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 0 8px rgba(255,220,150,0.8),
        0 0 16px rgba(255,220,150,0.5),
        2px 2px 6px rgba(0,0,0,0.7);
    }

    /* Footer area anchors the strap and button to the right, echoing a physical closure */
    .footer {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: clamp(1rem, 3vw, 1.6rem);
    }

    /* Strap is intentionally thin and offset to suggest a fastening band, not a full footer bar */
    .footer::before {
      content: "";
      position: absolute;
      right: 0;
      width: clamp(120px, 35vw, 160px);
      height: clamp(18px, 2.6vw, 24px);
      background: #4f3a26;
      border-radius: 4px;
      background-image:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.10),
          rgba(0,0,0,0.25),
          rgba(255,255,255,0.10)
        ),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 2px,
          rgba(0,0,0,0.15) 3px,
          rgba(0,0,0,0.15) 5px
        );
      box-shadow:
        inset 0 0 6px rgba(0,0,0,0.45),
        inset 0 0 12px rgba(0,0,0,0.25);
    }

    /* Button is styled to feel like a small metal plate you press, not a generic web button */
    .open-button {
      position: relative;
      z-index: 2;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: clamp(0.55rem, 2vw, 0.9rem) clamp(1.2rem, 4vw, 1.8rem);
      font-size: clamp(1rem, 4vw, 1.3rem);
      line-height: 1;
      border: 1px solid #f5d99c;
      color: #f5d99c;
      text-decoration: none;
      box-shadow:
        inset 0 0 6px rgba(255,255,255,0.2),
        0 0 8px rgba(0,0,0,0.45);
      transition: background 0.25s, color 0.25s, box-shadow 0.25s;
    }

    .open-button:hover {
      background: #f5d99c;
      color: #6a4a2c;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.35),
        0 0 14px rgba(255,220,150,0.6);
    }

    /* Dark mode keeps the same material metaphor but deepens tones to match system ambience */
    @media (prefers-color-scheme: dark) {
      body {
        background: #62482a;
        background-image:
          radial-gradient(circle at 20% 40%, rgba(0,0,0,0.25), transparent 60%),
          radial-gradient(circle at 80% 70%, rgba(0,0,0,0.20), transparent 70%),
          radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.70) 100%);
      }

      .cover-frame {
        background: #3a2a18;
        background-image:
          repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.02) 0px,
            rgba(255,255,255,0.02) 2px,
            rgba(0,0,0,0.18) 3px,
            rgba(0,0,0,0.18) 5px
          ),
          radial-gradient(circle at 25% 30%, rgba(255,255,255,0.06), transparent 60%),
          radial-gradient(circle at 75% 70%, rgba(255,255,255,0.04), transparent 70%),
          linear-gradient(135deg, rgba(0,0,0,0.65), rgba(0,0,0,0.85));
        box-shadow:
          inset 0 0 30px rgba(0,0,0,0.65),
          inset 0 0 50px rgba(0,0,0,0.45),
          0 0 50px rgba(0,0,0,0.75);
      }

      .open-button {
        border-color: #e8c98a;
        color: #e8c98a;
      }

      .open-button:hover {
        background: #e8c98a;
        color: #3a2a18;
      }
    }
  </style>
</head>
<body>
  <div class="cover-frame">
    <h1 class="gold-title">The Poets Codex</h1>
    <div class="footer">
      <a href="contents.html" class="open-button">Open</a>
    </div>
  </div>
</body>
</html>
