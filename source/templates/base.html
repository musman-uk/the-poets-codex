<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <!-- manuscript-style serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        /* base layout */
        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        /* site header */
        .site-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--brown-ink);
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* poet theme (only applied on poet pages) */
        body.poet-theme {
            background-color: var(--color-1);
            color: var(--color-5);
        }

        body.poet-theme a {
            color: var(--color-3);
        }

        body.poet-theme a:hover {
            color: var(--color-4);
        }

        /* desktop adjustments */
        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }

            .site-title {
                font-size: 2.4rem;
            }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
