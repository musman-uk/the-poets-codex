<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
