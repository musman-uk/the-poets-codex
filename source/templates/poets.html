{% extends "base.html" %}

{% block content %}
<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    {% include "nav.html" %}
</header>

<article>
    <h1>Poets</h1>

    <p>A curated collection of voices across time, culture, and tradition.</p>

    <ul>
        {% for poet in poets %}
            <li><a href="/poets/{{ poet.id }}/">{{ poet.name }}</a></li>
        {% endfor %}
    </ul>
</article>
{% endblock %}
