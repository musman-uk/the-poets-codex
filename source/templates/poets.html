{% extends "base.html" %}

{% block content %}
<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    {% include "nav.html" %}
</header>

<article>
    <h1>Poets</h1>

    <p>A curated collection of voices across time, culture, and tradition.</p>

    <div class="poet-grid">
        {% for poet in poets %}
        <a class="poet-card" href="/poets/{{ poet.id }}/">
            <img src="/assets/images/{{ poet.image }}" alt="{{ poet.name }}">
            <h2>{{ poet.name }}</h2>
        </a>
        {% endfor %}
    </div>
</article>

<style>
.poet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
}

.poet-card {
    text-decoration: none;
    color: var(--brown-ink);
    text-align: center;
}

.poet-card img {
    width: 100%;
    border-radius: 6px;
    margin-bottom: 0.5rem;
}
</style>
{% endblock %}
