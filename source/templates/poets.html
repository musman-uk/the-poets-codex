{% extends "base.html" %}

{% block content %}
<article class="poet-page">

    {% if image %}
    <div class="poet-image">
        <img src="/assets/images/{{ image }}" alt="{{ title }}">
    </div>
    {% endif %}

    <h1>{{ title }}</h1>

    <div class="poet-bio">
        {{ content }}
    </div>

</article>
{% endblock %}
