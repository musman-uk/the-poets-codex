<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About</title>

    <!-- manuscript-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        /* mobile-first base styles */
        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        /* header and title */
        .site-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center; /* centers nav block */
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column; /* stacked on mobile */
            gap: 0.75rem;
            padding: 0;
            margin: 0;
            text-align: left; /* left-aligns nav items */
        }

        nav a {
            text-decoration: none;
            color: var(--brown-ink);
            font-size: 0.95rem; /* slightly smaller for poet names */
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* main content */
        .content {
            max-width: 100%;
            margin: 0 auto;
        }

        /* footer (only used on homepage) */
        .site-footer {
            margin-top: auto;
            text-align: right;
            font-size: 0.85rem;
            opacity: 0.6;
            padding-top: 1rem;
        }

        /* desktop styles */
        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }

            .site-title {
                font-size: 2.4rem;
            }

            nav ul {
                flex-direction: row; /* horizontal on desktop */
                gap: 1.5rem;
            }

            .content {
                max-width: 800px;
            }
        }
    </style>

    <!-- inline json metadata -->
    <script id="site-data" type="application/json">
    {
        "siteName": "The Poets Codex",
        "author": "Mohammed Usman"
    }
    </script>

    <!-- optional inline javascript -->
    <script>
        const siteDataEl = document.getElementById("site-data");
        const siteData = siteDataEl ? JSON.parse(siteDataEl.textContent) : {};
        console.log("Loaded site:", siteData.siteName);
    </script>

</head>

<body>

<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    <nav class="site-nav">
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/poets/index.html">Poets</a></li>
    </ul>
</nav>
</header>

<main class="content">
    
<h1>About</h1>
<p>This is a simple test page to verify templates and styling.</p>

</main>



</body>
</html>
