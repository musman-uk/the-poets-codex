<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <!-- manuscript-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #f7f3e9;
            --ink: #000000;
        }

        /* mobile-first base styles */
        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream);
            color: var(--ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        /* header and title */
        .site-header {
            margin-bottom: 1.5rem;
            text-align: center; /* centers the title and nav container */
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center; /* centers the nav block */
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column; /* stacked on mobile */
            gap: 0.75rem;
            padding: 0;
            margin: 0;
            text-align: left; /* left-aligns the nav items */
        }

        nav a {
            text-decoration: none;
            color: var(--ink);
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* main content */
        .content {
            max-width: 100%;
            margin: 0 auto;
        }

        /* footer signature */
        .site-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--ink);
            text-align: right; /* bottom-right signature */
        }

        /* desktop styles */
        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }

            .site-title {
                font-size: 2.4rem;
            }

            nav ul {
                flex-direction: row; /* horizontal on desktop */
                gap: 1.5rem;
            }

            .content {
                max-width: 800px;
            }
        }
    </style>

    <!-- inline json metadata -->
    <script id="site-data" type="application/json">
    {
        "siteName": "The Poets Codex",
        "author": "Mohammed Usman"
    }
    </script>

    <!-- optional inline javascript -->
    <script>
        const siteDataEl = document.getElementById("site-data");
        const siteData = siteDataEl ? JSON.parse(siteDataEl.textContent) : {};
        console.log("Loaded site:", siteData.siteName);
    </script>

</head>

<body>

<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    <nav class="site-nav">
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/poets/index.html">Poets</a></li>
    </ul>
</nav>
</header>

<main class="content">
    
<h1>Home</h1>
<p>Welcome to The Poets Codex</p>

</main>

<footer class="site-footer">
    © Mohammed Usman
</footer>

</body>
</html>
