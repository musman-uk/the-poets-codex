<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/the-poets-codex/assets/images/favicon.png">

<title>The Poets Codex</title>

<style>

/* ------------------------------------------------------ */
/* ------------------ THEME VARIABLES ------------------- */
/* ------------------------------------------------------ */

/* Default = DARK (for everyone) */
:root {
  --bg: #3b2a19;
  --cover: #3c2c18;

  --button-border: #e8c98a;
  --button-text: #e8c98a;

  --gold-1: #fff4d0;
  --gold-2: #d4a84f;
  --gold-3: #f7e7b5;

  --strap: #4f3a26;
}

/* LIGHT MODE — only for non-Samsung browsers */
@media (prefers-color-scheme: light) {
  :root:not(.samsung) {
    --bg: #d5b485;
    --cover: #6a4a2c;

    --button-border: #f5d99c;
    --button-text: #f5d99c;

    --strap: #4f3a26;
  }
}

/* ------------------------------------------------------ */
/* ------------------- BASE STYLING --------------------- */
/* ------------------------------------------------------ */

body {
  margin: 0;
  padding: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 40%, rgba(0,0,0,0.07), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 70%),
    radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.40) 100%);
  background-blend-mode: multiply, overlay, overlay, normal;

  font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
}

.cover-frame {
  width: min(420px, 90vw);
  height: 85vh;
  padding: 2rem;

  background: var(--cover);

  background-image:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 2px,
      rgba(0,0,0,0.10) 3px,
      rgba(0,0,0,0.10) 5px
    ),
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.10), transparent 60%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.08), transparent 70%),
    linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));

  background-blend-mode: overlay, overlay, multiply, normal;

  border: 3px solid rgba(255,255,255,0.08);
  border-radius: 12px;

  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.55),
    inset 0 0 40px rgba(0,0,0,0.35),
    0 0 40px rgba(0,0,0,0.65);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: clamp(2.8rem, 8vw, 5rem);
}

.gold-title {
  font-size: clamp(2rem, 7vw, 2.6rem);
  letter-spacing: clamp(0.06em, 0.4vw, 0.15em);
  line-height: 1.1;
  text-align: center;
  max-width: 90%;

  margin-top: clamp(-1.4rem, -2.4vw, -2rem);

  background: linear-gradient(
    90deg,
    var(--gold-1) 0%,
    var(--gold-2) 20%,
    var(--gold-3) 50%,
    var(--gold-2) 80%,
    var(--gold-1) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 8px rgba(255,220,150,0.8),
    0 0 16px rgba(255,220,150,0.5),
    2px 2px 6px rgba(0,0,0,0.7);
}

.footer {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding-right: clamp(1rem, 3vw, 1.6rem);
}

.footer::before {
  content: "";
  position: absolute;
  right: 0;

  width: clamp(120px, 35vw, 160px);
  height: clamp(18px, 2.6vw, 24px);

  background: var(--strap);
  border-radius: 4px;

  background-image:
    linear-gradient(
      90deg,
      rgba(255,255,255,0.10),
      rgba(0,0,0,0.25),
      rgba(255,255,255,0.10)
    ),
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 5px
    );

  box-shadow:
    inset 0 0 6px rgba(0,0,0,0.45),
    inset 0 0 12px rgba(0,0,0,0.25);
}

.open-button {
  position: relative;
  z-index: 2;

  display: inline-flex;
  justify-content: center;
  align-items: center;

  padding: clamp(0.55rem, 2vw, 0.9rem) clamp(1.2rem, 4vw, 1.8rem);
  font-size: clamp(1rem, 4vw, 1.3rem);
  line-height: 1;

  border: 1px solid var(--button-border);
  color: var(--button-text);
  text-decoration: none;

  box-shadow:
    inset 0 0 6px rgba(255,255,255,0.2),
    0 0 8px rgba(0,0,0,0.45);

  transition: background 0.25s, color 0.25s, box-shadow 0.25s;
}

.open-button:hover {
  background: var(--button-border);
  color: var(--cover);
  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.35),
    0 0 14px rgba(169, 141, 84, 0.6);
}

</style>
</head>

<body>

<div class="cover-frame">
  <h1 class="gold-title">The Poets Codex</h1>
  <div class="footer">
    <a href="contents.html" class="open-button">Open</a>
  </div>
</div>

<script>
/* Detect Samsung Internet */
if (navigator.userAgent.includes("SamsungBrowser")) {
  document.documentElement.classList.add("samsung");
}
</script>

</body>
</html>
