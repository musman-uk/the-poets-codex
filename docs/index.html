<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Poets Codex</title>

<style>

/* --- Wooden desk background (same as Contents page) --- */
body {
  margin: 0;
  padding: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: #d5b485;
  background-image:
    radial-gradient(circle at 20% 40%, rgba(0,0,0,0.07), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.05), transparent 70%),
    radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.40) 100%);
  background-blend-mode: multiply, overlay, overlay, normal;

  font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
}

/* --- Portrait book cover frame (lighter leather) --- */
.cover-frame {
  width: min(420px, 90vw);
  height: 85vh;
  padding: 2rem;

  background: #6a4a2c;

  background-image:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 2px,
      rgba(0,0,0,0.10) 3px,
      rgba(0,0,0,0.10) 5px
    ),
    radial-gradient(circle at 25% 30%, rgba(255,255,255,0.10), transparent 60%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.08), transparent 70%),
    linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.65));

  background-blend-mode: overlay, overlay, multiply, normal;

  border: 3px solid rgba(255,255,255,0.08);
  border-radius: 12px;

  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.55),
    inset 0 0 40px rgba(0,0,0,0.35),
    0 0 40px rgba(0,0,0,0.65);

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  gap: clamp(2.8rem, 8vw, 5rem);
}

/* --- Title --- */
.gold-title {
  font-size: clamp(2rem, 7vw, 2.6rem);
  letter-spacing: clamp(0.06em, 0.4vw, 0.15em);
  line-height: 1.1;
  text-align: center;
  max-width: 90%;

  margin-top: clamp(-1.4rem, -2.4vw, -2rem);

  background: linear-gradient(
    90deg,
    #fff4d0 0%,
    #d4a84f 20%,
    #f7e7b5 50%,
    #d4a84f 80%,
    #fff4d0 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 8px rgba(255,220,150,0.8),
    0 0 16px rgba(255,220,150,0.5),
    2px 2px 6px rgba(0,0,0,0.7);
}

/* --- Thin right-side leather strap --- */
.footer {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding-right: clamp(1rem, 3vw, 1.6rem);
}

.footer::before {
  content: "";
  position: absolute;
  right: 0;

  width: clamp(120px, 35vw, 160px);
  height: clamp(18px, 2.6vw, 24px);

  background: #4f3a26;
  border-radius: 4px;

  background-image:
    linear-gradient(
      90deg,
      rgba(255,255,255,0.10),
      rgba(0,0,0,0.25),
      rgba(255,255,255,0.10)
    ),
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 5px
    );

  box-shadow:
    inset 0 0 6px rgba(0,0,0,0.45),
    inset 0 0 12px rgba(0,0,0,0.25);
}

/* --- Open button --- */
.open-button {
  position: relative;
  z-index: 2;

  display: inline-flex;
  justify-content: center;
  align-items: center;

  padding: clamp(0.55rem, 2vw, 0.9rem) clamp(1.2rem, 4vw, 1.8rem);
  font-size: clamp(1rem, 4vw, 1.3rem);
  line-height: 1;

  border: 1px solid #f5d99c;
  color: #f5d99c;
  text-decoration: none;

  box-shadow:
    inset 0 0 6px rgba(255,255,255,0.2),
    0 0 8px rgba(0,0,0,0.45);

  transition: background 0.25s, color 0.25s, box-shadow 0.25s;
}

.open-button:hover {
  background: #f5d99c;
  color: #6a4a2c;
  box-shadow:
    inset 0 0 10px rgba(0,0,0,0.35),
    0 0 14px rgba(255,220,150,0.6);
}
</style>

</head>
<body>

<div class="cover-frame">

  <h1 class="gold-title">The Poets Codex</h1>

  <div class="footer">
    <a href="hub.html" class="open-button">Open</a>
  </div>

</div>

</body>
</html>
