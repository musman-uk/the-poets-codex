<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <!-- Poetic manuscript-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Inline CSS -->
    <style>
        /* Global colours */
        :root {
            --cream: #f7f3e9;
            --deep-green: #0b3d2e;
            --deep-green-soft: #145c44;
            --ink: #0a2f23;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream);
            color: var(--ink);
            margin: 0;
            padding: 2rem;
            line-height: 1.7;
            font-size: 19px;
        }

        .site-header {
            margin-bottom: 2rem;
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2.4rem;
            color: var(--deep-green);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--deep-green-soft);
            font-weight: 400;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        .site-footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--deep-green-soft);
            text-align: center;
        }

        /* Responsive layout */
        @media (max-width: 768px) {
            body {
                padding: 1.2rem;
                font-size: 17px;
            }

            .site-title {
                font-size: 2rem;
            }

            nav ul {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>

    <!-- Inline JSON metadata -->
    <script id="site-data" type="application/json">
    {
        "siteName": "The Poets Codex",
        "author": "Mohammed Usman"
    }
    </script>

    <!-- Inline JS (optional, future-proof) -->
    <script>
        const siteDataEl = document.getElementById("site-data");
        const siteData = siteDataEl ? JSON.parse(siteDataEl.textContent) : {};
        console.log("Loaded site:", siteData.siteName);
    </script>

</head>

<body>

<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    <nav class="site-nav">
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/poets/index.html">Poets</a></li>
    </ul>
</nav>
</header>

<main class="content">
    
<h1>Home</h1>
<p>Welcome to The Poets Codex</p>

</main>

<footer class="site-footer">
    © Mohammed Usman
</footer>

</body>
</html>
