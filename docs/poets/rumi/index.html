<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rumi</title>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }
        }
    </style>

    
<style>
    :root {
        --color-1: #6A4C93;
        --color-2: #1982C4;
        --color-3: #8AC926;
        --color-4: #FFCA3A;
        --color-5: #FF595E;
    }

    body.poet-theme {
        background-color: var(--color-1);
        color: var(--color-5);
    }

    .back-link a {
        color: var(--color-3);
        text-decoration: none;
    }

    .back-link a:hover {
        color: var(--color-4);
        text-decoration: underline;
    }

    .poet-image img {
        max-width: 100%;
        margin-bottom: 1rem;
    }
</style>

</head>

<body class="poet-theme">
    <main class="content">
        
<div class="back-link">
    <a href="/poets/">← Back to Poets</a>
</div>

<article class="poet-page">
    
    <div class="poet-image">
        <img src="/assets/images/rumi.png" alt="Rumi">
    </div>
    

    <h1>Rumi</h1>

    <div class="poet-bio">
        <p>Jalāl ad‑Dīn Muhammad Rūmī (1207–1273) was a Persian poet, mystic, and scholar whose work explores love, longing, and the search for the divine.</p>
<p>His verses continue to resonate across cultures, offering a sense of stillness, wonder, and spiritual clarity.</p>
    </div>
</article>

    </main>
</body>
</html>
