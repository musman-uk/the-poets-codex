<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Muhammad Iqbal</title>

    <!-- manuscript-style serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        /* base layout */
        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        /* site header */
        .site-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--brown-ink);
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* poet theme (only applied on poet pages) */
        body.poet-theme {
            background-color: var(--color-1);
            color: var(--color-5);
        }

        body.poet-theme a {
            color: var(--color-3);
        }

        body.poet-theme a:hover {
            color: var(--color-4);
        }

        /* desktop adjustments */
        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }

            .site-title {
                font-size: 2.4rem;
            }
        }
    </style>

    
<style>
    :root {
        --color-1: #2E294E;
        --color-2: #541388;
        --color-3: #F1E9DA;
        --color-4: #FFD400;
        --color-5: #D90368;
    }

    body.poet-theme {
        background-color: var(--color-1);
        color: var(--color-5);
    }

    .back-link a {
        color: var(--color-3);
        text-decoration: none;
    }

    .back-link a:hover {
        color: var(--color-4);
        text-decoration: underline;
    }

    .poet-image img {
        max-width: 100%;
        margin-bottom: 1rem;
    }
</style>

</head>

<body class="poet-theme">
    <main class="content">
        
<div class="back-link">
    <a href="/poets/">← Back to Poets</a>
</div>

<article class="poet-page">
    
    <div class="poet-image">
        <img src="/assets/images/iqbal.png" alt="Muhammad Iqbal">
    </div>
    

    <h1>Muhammad Iqbal</h1>

    <div class="poet-bio">
        <p>Sir Muhammad Iqbal (1877–1938) was a philosopher‑poet whose work blends metaphysics, selfhood, and the awakening of the human spirit.</p>
<p>His poetry invites reflection on identity, purpose, and the inner strength of the individual.</p>
    </div>
</article>

    </main>
</body>
</html>
