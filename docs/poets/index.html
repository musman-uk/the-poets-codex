<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poets</title>

    <!-- manuscript-style serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-dark: #f2e9d8;
            --brown-ink: #4a3b2a;
        }

        /* base layout */
        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            font-family: "Crimson Pro", Georgia, serif;
            background-color: var(--cream-dark);
            color: var(--brown-ink);
            margin: 0;
            padding: 1.2rem;
            line-height: 1.7;
            font-size: 17px;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
        }

        /* site header */
        .site-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .site-title {
            margin: 0 0 1rem 0;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* navigation */
        nav {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            padding: 0;
            margin: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--brown-ink);
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* poet theme (only applied on poet pages) */
        body.poet-theme {
            background-color: var(--color-1);
            color: var(--color-5);
        }

        body.poet-theme a {
            color: var(--color-3);
        }

        body.poet-theme a:hover {
            color: var(--color-4);
        }

        /* desktop adjustments */
        @media (min-width: 769px) {
            body {
                padding: 2rem;
                font-size: 19px;
            }

            .site-title {
                font-size: 2.4rem;
            }
        }
    </style>

    
</head>

<body class="">
    <main class="content">
        
<header class="site-header">
    <h1 class="site-title">The Poets Codex</h1>
    <nav class="site-nav">
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/about/">About</a></li>
    <li><a href="/poets/">Poets</a></li>
  </ul>
</nav>
</header>

<article>
    <h1>Poets</h1>

    <p>A curated collection of voices across time, culture, and tradition.</p>

    <div class="poet-grid">
        
        <a class="poet-card" href="/poets/rumi/">
            <img src="/assets/images/rumi.png" alt="Rumi">
            <h2>Rumi</h2>
        </a>
        
        <a class="poet-card" href="/poets/shakespeare/">
            <img src="/assets/images/shakespeare.png" alt="William Shakespeare">
            <h2>William Shakespeare</h2>
        </a>
        
        <a class="poet-card" href="/poets/iqbal/">
            <img src="/assets/images/iqbal.png" alt="Muhammad Iqbal">
            <h2>Muhammad Iqbal</h2>
        </a>
        
    </div>
</article>

<style>
.poet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
}

.poet-card {
    text-decoration: none;
    color: var(--brown-ink);
    text-align: center;
}

.poet-card img {
    width: 100%;
    border-radius: 6px;
    margin-bottom: 0.5rem;
}
</style>

    </main>
</body>
</html>
